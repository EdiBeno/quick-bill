services:
  - type: web
    name: my-playwright-service
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    # Added worker class and threads for concurrency
    startCommand: gunicorn -w 1 --threads 100 --worker-class gthread main:app --bind 0.0.0.0:$PORT
    disk:
      name: translations-disk
      mountPath: /opt/render/project/src/translations
      sizeGB: 1
