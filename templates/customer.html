{% set _lang = (lang | default('he')) %}
<!DOCTYPE html>
<html lang="{{ _lang }}" dir="{{ 'rtl' if _lang in ['he','ar','fa','ur'] else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול לקוחות</title>
    <script>
        function clearData() {
            fetch('/clear_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload(); // Refresh the page
                } else {
                    alert('Failed to clear data: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while clearing data');
            });
        }

        function validateForm() {
            var form = document.getElementById('customer');
            var inputs = form.querySelectorAll('input[required]');
            var errorMessage = '';
            
            inputs.forEach(function(input) {
                if (!input.value) {
                    errorMessage += 'Please fill out the ' + input.name + ' field.<br>';
                }
            });
            
            if (errorMessage) {
                document.getElementById('error-message').innerHTML = errorMessage;
            } else {
                form.submit();
            }
        }
    </script>
<style>
/* Wrapper that adds 4cm spacing on both sides */
.form-wrapper {
    padding-left: 4cm;
    padding-right: 4cm;
    width: 100%;
    box-sizing: border-box;
}

/* Container of all columns */
.form-container {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
}

/* Each column */
.form-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 33%;
}

/* Each row inside a column */
.form-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
}

/* Labels */
.form-row label {
    width: 35%;
    font-weight: bold;
    font-size: 1.2em;
}

/* Inputs */
.form-row input,
.form-row select {
    width: 60%;
    height: 0.6cm;
    padding: 3px 6px;
    font-size: 1em;
    font-weight: bold;
    border: 1px solid #999;
    border-radius: 4px;
    direction: rtl;
}

/* Full-width message row */
.full-width-row {
    margin-top: 15px;
    display: flex;
    flex-direction: row;
    align-items: center;
}

.full-width-row label {
    width: 2cm;
    font-weight: bold;
}

.full-width-row input {
    width: calc(100% - 2.5cm);
    height: 0.9cm;
    font-size: 1.1em;
    border: 1px solid #999;
    border-radius: 4px;
    padding-right: 8px;
}

/* Buttons */
button {
    cursor: pointer;
    border: none;
    background-color: #0078d4;
    color: white;
    border-radius: 4px;
}

button:hover {
    background-color: #005fa3;
}

/* נטרול כל הכפתורים עד שהתרגום מסיים */
#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 40px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

<body>

<div class="container">
    <div class="column1"></div>
    <div class="column2">

        <!-- TITLE -->

<!-- הטופס הראשי שמתחיל כאן חייב לעטוף את הכל -->
<form action="{{ url_for('customer') }}" method="POST" id="form-body">

<div class="form-wrapper">

    <div class="form-container">

        <!-- COLUMN 1 -->

                <input type="date" id="date" name="date" style="font-size: 17px; height: 0.6cm;" value="{{ customer.date }}" required>
            </div>

            <div class="form-row">
                <label for="customer_name" data-i18n="customer.name">שם הלקוח:</label>
                <input type="text" id="customer_name" name="customer_name"
                       value="{{ customer_i18n.name or customer.customer_name }}">
            </div>

            <div class="form-row">
                <label for="id_number" data-i18n="customer.id_number">מספר זהות / ח.פ:</label>
                <input type="text" id="id_number" name="id_number" value="{{ customer.id_number if customer else '' }}">
            </div>
        </div>

        <!-- COLUMN 2 -->
        <div class="form-column">
            <div class="form-row">
                <label for="address" data-i18n="customer.address">כתובת:</label>
                <input type="text" id="address" name="address"
                       value="{{ customer_i18n.address or customer.address }}">
            </div>

            <div class="form-row">
                <label for="city" data-i18n="customer.city">עיר:</label>
                <input type="text" id="city" name="city"
                       value="{{ customer_i18n.city or customer.city }}">
            </div>

            <div class="form-row">
                <label for="postal_code" data-i18n="customer.postal_code">מיקוד:</label>

            </div>
        </div>

        <!-- COLUMN 3 -->

</form> <!-- סגירת הטופס הראשי כאן, אחרי כפתור השמירה -->

        <!-- Go to Main Page Button -->

            <button type="button" data-i18n="customer.main_page" style="font-weight: bold; width: 5.8cm; height: 0.5cm; font-size: 17px; display: flex; align-items: center; justify-content: center;">

        </a>

        <!-- Search Form for Customer -->

            <label for="search_name" data-i18n="customer.search" style="font-weight: bold; width: 5.7cm; height: 0.8cm; font-size: 19px; display: flex; align-items: center; margin-right: 9px;">חיפוש שם לקוחות:</label>

                {% endfor %}

            <button type="submit" data-i18n="customer.search_button" style="font-weight: bold; width: 2.4cm; height: 0.5cm; font-size: 17px; display: flex; align-items: center; justify-content: center;">חיפוש</button>
        </form>

        <div id="loadingOverlay" data-i18n="loading.translation">⏳ מבצע תרגום... אנא המתן...</div>

        <!-- Clear Data Button for Customer -->
        <form method="POST" action="{{ url_for('clear_search_results_customer') }}" style="display: flex; align-items: center;">
            <button type="submit" data-i18n="customer.clear" style="font-weight: bold; width: 3.5cm; height: 0.5cm; font-size: 17px; display: flex; align-items: center; justify-content: center; margin-right: 10px;">נקה מידע</button>
        </form>

        <!-- Go to Customer Data Page Button -->
        <a href="{{ url_for('customer_data') }}" style="text-decoration: none;">
            <button type="button" data-i18n="customer.data" style="font-weight: bold; width: 4.7cm; height: 0.5cm; font-size: 17px; display: flex; align-items: center; justify-content: center;">מידע לקוחות</button>
        </a>

    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const formBody = document.getElementById('form-body');
    if (formBody) {
        const allFields = Array.from(formBody.querySelectorAll('input, textarea, select'));

        formBody.addEventListener('keydown', function (event) {
            const key = event.key;
            const current = event.target;
            const index = allFields.indexOf(current);

            if (index === -1) return;

            // אם השדה הוא select ונלחץ חץ למטה — נפתח את הרשימה
            if (current.tagName === 'SELECT' && key === 'ArrowDown') {
                current.size = current.options.length; // פותח את כל האפשרויות
                event.preventDefault();
                return;
            }

            // אם השדה הוא select ונלחץ חץ למעלה — סוגר את הרשימה
            if (current.tagName === 'SELECT' && key === 'ArrowUp') {
                current.size = 1;
                event.preventDefault();
                return;
            }

            // ניווט רגיל בין שדות
            if (key === 'ArrowDown' && index < allFields.length - 1) {
                allFields[index + 1].focus();
                event.preventDefault();
            }
            if (key === 'ArrowUp' && index > 0) {
                allFields[index - 1].focus();
                event.preventDefault();
            }
        });

        // הדגשה כששדה נבחר
        allFields.forEach(field => {
            field.addEventListener('focus', () => {
                field.style.backgroundColor = '#e6f7ff';
                field.style.outline = '1px solid #007bff';
                if (field.tagName === 'SELECT') {
                    field.size = 1; // סגור את הרשימה כברירת מחדל
                }
            });
            field.addEventListener('blur', () => {
                field.style.backgroundColor = '';
                field.style.outline = '';
                if (field.tagName === 'SELECT') {
                    field.size = 1; // סגור את הרשימה כשמאבדים פוקוס
                }
            });
        });
    }
});
</script>
