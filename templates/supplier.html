{% set _lang = (lang | default('he')) %}
<!DOCTYPE html>
<html lang="{{ _lang }}" dir="{{ 'rtl' if _lang in ['he','ar','fa','ur'] else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול ספקים</title>
    <script>
        function clearData() {
            fetch('/clear_data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    location.reload(); // Refresh the page
                } else {
                    alert('Failed to clear data: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while clearing data');
            });
        }
    </script>
<style>
/* Wrapper that adds 4cm spacing on both sides */
.form-wrapper {
    padding-left: 4cm;
    padding-right: 4cm;
    width: 100%;
    box-sizing: border-box;
}

/* Container of all columns */
.form-container {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
}

/* Each column */
.form-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 33%;
}

/* Each row inside a column */
.form-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
}

/* Labels */
.form-row label {
    width: 35%;
    font-weight: bold;
    font-size: 1.2em;
}

/* Inputs */
.form-row input,
.form-row select {
    width: 60%;
    height: 0.6cm;
    padding: 3px 6px;
    font-size: 1em;
    font-weight: bold;
    border: 1px solid #999;
    border-radius: 4px;
    direction: rtl;
}

/* Full-width message row */
.full-width-row {
    margin-top: 15px;
    display: flex;
    flex-direction: row;
    align-items: center;
}

.full-width-row label {
    width: 2cm;
    font-weight: bold;
}

.full-width-row input {
    width: calc(100% - 2.5cm);
    height: 0.9cm;
    font-size: 1.1em;
    border: 1px solid #999;
    border-radius: 4px;
    padding-right: 8px;
}

/* Buttons */
button {
    cursor: pointer;
    border: none;
    background-color: #0078d4;
    color: white;
    border-radius: 4px;
}

button:hover {
    background-color: #005fa3;
}

/* נטרול כל הכפתורים עד שהתרגום מסיים */
#loadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 40px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

<script>
document.addEventListener('DOMContentLoaded', function () {
    const formBody = document.getElementById('supplier');
    if (formBody) {
        const allFields = Array.from(formBody.querySelectorAll('input, textarea, select'));

        formBody.addEventListener('keydown', function (event) {
            const key = event.key;
            const current = event.target;
            const index = allFields.indexOf(current);

            if (index === -1) return;

            // אם השדה הוא select ונלחץ חץ למטה — נפתח את הרשימה
            if (current.tagName === 'SELECT' && key === 'ArrowDown') {
                current.size = current.options.length; // פותח את כל האפשרויות
                event.preventDefault();
                return;
            }

            // אם השדה הוא select ונלחץ חץ למעלה — סוגר את הרשימה
            if (current.tagName === 'SELECT' && key === 'ArrowUp') {
                current.size = 1;
                event.preventDefault();
                return;
            }

            // ניווט רגיל בין שדות
            if (key === 'ArrowDown' && index < allFields.length - 1) {
                allFields[index + 1].focus();
                event.preventDefault();
            }
            if (key === 'ArrowUp' && index > 0) {
                allFields[index - 1].focus();
                event.preventDefault();
            }
        });

        // הדגשה כששדה נבחר
        allFields.forEach(field => {
            field.addEventListener('focus', () => {
                field.style.backgroundColor = '#e6f7ff';
                field.style.outline = '1px solid #007bff';
                if (field.tagName === 'SELECT') {
                    field.size = 1; // סגור את הרשימה כברירת מחדל
                }
            });
            field.addEventListener('blur', () => {
                field.style.backgroundColor = '';
                field.style.outline = '';
                if (field.tagName === 'SELECT') {
                    field.size = 1; // סגור את הרשימה כשמאבדים פוקוס
                }
            });
        });
    }
});
</script>

<script>
/**
 * מעדכן את תצוגת התאריך בדף הלקוחות
 */
function updatesupplierDateDisplay() {
    const dateInput = document.getElementById('supplier_date_input');
    const displayInput = document.getElementById('supplier_date_display');
    
    if (!dateInput || !displayInput) return;

    const currentLang = localStorage.getItem("lang") || "he";

    try {
        const val = dateInput.value;
        if (!val) return;

        const d = new Date(val);
        if (!isNaN(d.getTime())) {
            // תמיכה ב-30 שפות דרך Intl API
            const formatter = new Intl.DateTimeFormat(currentLang, {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            // החלפת מפרידים למקף לאחידות
            let formatted = formatter.format(d).replace(/[\/.]/g, '-');
            displayInput.value = formatted;
        }
    } catch (e) {
        displayInput.value = dateInput.value;
    }
}

// 1. הפעלה בטעינת הדף
document.addEventListener("DOMContentLoaded", () => {
    updatesupplierDateDisplay();
    
    // מוודא שהשדה הוויזואלי לא חוסם את הקליק על השדה השקוף
    const displayInput = document.getElementById('supplier_date_display');
    if (displayInput) displayInput.style.pointerEvents = 'none';
});

// 2. עדכון שפה בזמן אמת
const originalLoadLanguage = window.loadLanguage;
window.loadLanguage = function(lang) {
    if (typeof originalLoadLanguage === 'function') originalLoadLanguage(lang);
    updatesupplierDateDisplay();
};

// 3. עדכון מטאבים אחרים
window.addEventListener('storage', (e) => {
    if (e.key === 'lang') updatesupplierDateDisplay();
});
</script>
